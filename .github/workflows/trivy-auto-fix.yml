name: Trivy Auto-Fix

on:
  push:
    paths:
      - 'TrivyDemo/pom.xml'
  workflow_dispatch:

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Scan
        run: |
          trivy fs TrivyDemo/pom.xml --severity HIGH,CRITICAL --format json -o trivy-report.json || true
          echo "Trivy scan complete"
          cat trivy-report.json

      - name: Fix with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Checking secret..."
          if [ -z "$GROQ_API_KEY" ]; then
            echo "ERROR: Secret is empty!"
            exit 1
          else
            echo "Secret is set, length: ${#GROQ_API_KEY}"
          fi

          cat > fix.py << PYEOF
          import json, urllib.request, urllib.error, os, sys

          groq_key = "$GROQ_API_KEY"
          print("Key length: " + str(len(groq_key)))

          with open("trivy-report.json") as f:
              report = f.read()

          with open("TrivyDemo/pom.xml") as f:
              pom = f.read()

          report_clean = report.replace("\\", "").replace('"', "'").replace("\n", " ")
          pom_clean = pom.replace("\\", "").replace('"', "'").replace("\n", " ")

          body = json.dumps({
              "model": "llama-3.3-70b-versatile",
              "temperature": 0.1,
              "messages": [
                  {"role": "system", "content": "Only respond with valid JSON. No markdown."},
                  {"role": "user", "content": "Fix vulnerabilities in this pom.xml. Report: " + report_clean + " pom.xml: " + pom_clean + " Respond ONLY: {\"updatedPom\": \"complete fixed pom.xml with newlines as \\\\n\"}"}
              ]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.groq.com/openai/v1/chat/completions",
              data=body,
              headers={"Content-Type": "application/json", "Authorization": "Bearer " + groq_key},
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
                  print("Groq responded!")
          except urllib.error.HTTPError as e:
              print("Error: " + str(e.code) + " " + e.read().decode())
              sys.exit(1)

          content = data["choices"][0]["message"]["content"]
          content = content.replace("\`\`\`json", "").replace("\`\`\`", "").strip()
          parsed = json.loads(content[content.index("{"):content.rindex("}")+1])
          fixed_pom = parsed["updatedPom"].replace("\\n", "\n")

          with open("TrivyDemo/pom.xml", "w") as f:
              f.write(fixed_pom)
          print("pom.xml updated!")
          PYEOF

          python3 fix.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix vulnerabilities detected by Trivy"
          title: " Auto-Fix: Vulnerabilities detected and fixed by AI"
          body: |
            ## Automatic Security Fix

            Trivy detected vulnerabilities in `pom.xml`.
            Groq AI has automatically updated the dependency versions to safe versions.

            Please review and merge.
          branch: auto-fix-vulnerabilities
          base: main
          delete-branch: true