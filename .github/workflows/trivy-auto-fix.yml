name: Trivy Auto-Fix

on:
  push:
    paths:
      - 'TrivyDemo/pom.xml'
  workflow_dispatch:

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Scan
        run: |
          trivy fs TrivyDemo/pom.xml --severity HIGH,CRITICAL --format json -o trivy-report.json || true
          echo "Trivy scan complete"

      - name: Fix with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Secret length: ${#GROQ_API_KEY}"

          python3 << 'PYEOF'
          import json, urllib.request, urllib.error, sys, os

          groq_key = os.environ["GROQ_API_KEY"]
          print("Key length: " + str(len(groq_key)))

          with open("TrivyDemo/pom.xml") as f:
              pom = f.read()

          with open("trivy-report.json") as f:
              report = json.load(f)

          # Extract just vulnerability names from report
          vulns = []
          for result in report.get("Results", []):
              for v in result.get("Vulnerabilities", []):
                  vulns.append(v.get("VulnerabilityID","") + " " + v.get("PkgName","") + " " + v.get("InstalledVersion","") + " fixed:" + str(v.get("FixedVersion","")))

          vuln_text = ", ".join(vulns) if vulns else "no vulnerabilities"
          print("Vulnerabilities: " + vuln_text)

          message = (
              "Fix these vulnerabilities in the pom.xml: " + vuln_text +
              "\n\nCurrent pom.xml:\n" + pom +
              "\n\nRespond ONLY with this JSON and nothing else: " +
              '{"updatedPom": "the complete fixed pom.xml content"}'
          )

          body = json.dumps({
              "model": "llama-3.3-70b-versatile",
              "temperature": 0.1,
              "messages": [
                  {"role": "system", "content": "You are a Java security expert. Only respond with valid JSON. No markdown."},
                  {"role": "user", "content": message}
              ]
          }).encode("utf-8")

          req = urllib.request.Request(
              "https://api.groq.com/openai/v1/chat/completions",
              data=body,
              headers={
                  "Content-Type": "application/json",
                  "Authorization": "Bearer " + groq_key
              },
              method="POST"
          )

          try:
              with urllib.request.urlopen(req) as res:
                  data = json.loads(res.read().decode())
                  print("Groq responded successfully!")
          except urllib.error.HTTPError as e:
              print("HTTP Error: " + str(e.code))
              print(e.read().decode())
              sys.exit(1)

          content = data["choices"][0]["message"]["content"]
          content = content.replace("```json", "").replace("```", "").strip()
          start = content.index("{")
          end = content.rindex("}") + 1
          parsed = json.loads(content[start:end])
          fixed_pom = parsed["updatedPom"].replace("\\n", "\n")

          with open("TrivyDemo/pom.xml", "w") as f:
              f.write(fixed_pom)
          print("pom.xml updated successfully!")
          PYEOF

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix vulnerabilities detected by Trivy"
          title: " Auto-Fix: Vulnerabilities detected and fixed by AI"
          body: |
            ## Automatic Security Fix

            Trivy detected vulnerabilities in `pom.xml`.
            Groq AI has automatically updated the dependency versions to safe versions.

            Please review and merge.
          branch: auto-fix-vulnerabilities
          base: main
          delete-branch: true