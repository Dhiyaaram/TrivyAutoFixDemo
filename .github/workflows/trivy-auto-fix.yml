name: Trivy Auto-Fix

on:
  push:
    paths:
      - 'TrivyDemo/pom.xml'
  workflow_dispatch:

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Trivy
        run: |
          sudo apt-get install wget apt-transport-https gnupg -y
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo apt-key add -
          echo "deb https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update
          sudo apt-get install trivy -y

      - name: Run Trivy Scan
        run: |
          trivy fs TrivyDemo/pom.xml --severity HIGH,CRITICAL --format json -o trivy-report.json || true
          echo "Trivy scan complete"
          cat trivy-report.json

      - name: Fix with Groq AI
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "Secret length: ${#GROQ_API_KEY}"

          REPORT=$(cat trivy-report.json | tr -d '\n' | tr -d '"' | tr -d "'")
          POM=$(cat TrivyDemo/pom.xml | tr -d '\n' | tr -d '"' | tr -d "'")

          RESPONSE=$(curl -s -X POST \
            "https://api.groq.com/openai/v1/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -d "{
              \"model\": \"llama-3.3-70b-versatile\",
              \"temperature\": 0.1,
              \"messages\": [
                {\"role\": \"system\", \"content\": \"You are a Java security expert. Only respond with valid JSON.\"},
                {\"role\": \"user\", \"content\": \"Fix vulnerabilities. Trivy report: $REPORT pom.xml: $POM Respond ONLY: {updatedPom: complete fixed pom.xml with newlines as literal newlines}\"}
              ]
            }")

          echo "Groq response received"
          echo "$RESPONSE"
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['choices'][0]['message']['content']
          content = content.replace('\`\`\`json','').replace('\`\`\`','').strip()
          start = content.index('{')
          end = content.rindex('}') + 1
          parsed = json.loads(content[start:end])
          pom = parsed.get('updatedPom', '')
          with open('TrivyDemo/pom.xml', 'w') as f:
              f.write(pom)
          print('pom.xml updated!')
          "

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: auto-fix vulnerabilities detected by Trivy"
          title: " Auto-Fix: Vulnerabilities detected and fixed by AI"
          body: |
            ## Automatic Security Fix

            Trivy detected vulnerabilities in `pom.xml`.
            Groq AI has automatically updated the dependency versions to safe versions.

            Please review and merge.
          branch: auto-fix-vulnerabilities
          base: main
          delete-branch: true